<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" style="background:#0d1117">
  <defs>
    <marker id="b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8899aa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- Input -->
  <rect x="260" y="20" width="200" height="40" rx="6" fill="#141b24" stroke="#1e2a38" stroke-width="0.5"/>
  <text x="360" y="45" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#f0f4f8">tool call intent</text>
  <line x1="360" y1="60" x2="360" y2="84" stroke="#8899aa" stroke-width="1" fill="none" marker-end="url(#b)"/>
  <!-- Rule 1 -->
  <rect x="230" y="84" width="260" height="44" rx="6" fill="#0d1117" stroke="#2dd4bf" stroke-width="0.5"/>
  <rect x="230" y="84" width="260" height="2" rx="1" fill="#2dd4bf" opacity="0.4"/>
  <text x="360" y="104" text-anchor="middle" font-family="monospace" font-size="10" fill="#2dd4bf">RULE 1</text>
  <text x="360" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#8899aa">pattern: "^/etc/"  →  block</text>
  <line x1="490" y1="106" x2="540" y2="106" stroke="#8899aa" stroke-width="1" fill="none" marker-end="url(#b)"/>
  <text x="508" y="100" font-family="monospace" font-size="9" fill="#8899aa">match</text>
  <rect x="542" y="88" width="60" height="36" rx="4" fill="#1a0808" stroke="#f43f5e" stroke-width="0.5"/>
  <text x="572" y="110" text-anchor="middle" font-family="monospace" font-size="10" fill="#f43f5e">BLOCK</text>
  <line x1="360" y1="128" x2="360" y2="152" stroke="#8899aa" stroke-width="1" fill="none" marker-end="url(#b)"/>
  <text x="368" y="144" font-family="monospace" font-size="9" fill="#8899aa">no match</text>
  <!-- Rule 2 -->
  <rect x="230" y="152" width="260" height="44" rx="6" fill="#0d1117" stroke="#2dd4bf" stroke-width="0.5"/>
  <rect x="230" y="152" width="260" height="2" rx="1" fill="#2dd4bf" opacity="0.4"/>
  <text x="360" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#2dd4bf">RULE 2</text>
  <text x="360" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#8899aa">pattern: "^/tmp/"  →  allow</text>
  <line x1="490" y1="174" x2="540" y2="174" stroke="#8899aa" stroke-width="1" fill="none" marker-end="url(#b)"/>
  <text x="508" y="168" font-family="monospace" font-size="9" fill="#8899aa">match</text>
  <rect x="542" y="156" width="60" height="36" rx="4" fill="#081a10" stroke="#2dd4bf" stroke-width="0.5"/>
  <text x="572" y="178" text-anchor="middle" font-family="monospace" font-size="10" fill="#2dd4bf">ALLOW</text>
  <line x1="360" y1="196" x2="360" y2="220" stroke="#8899aa" stroke-width="1" fill="none" marker-end="url(#b)"/>
  <text x="368" y="212" font-family="monospace" font-size="9" fill="#8899aa">no match</text>
  <!-- Rule 3 -->
  <rect x="230" y="220" width="260" height="44" rx="6" fill="#0d1117" stroke="#2dd4bf" stroke-width="0.5"/>
  <rect x="230" y="220" width="260" height="2" rx="1" fill="#2dd4bf" opacity="0.4"/>
  <text x="360" y="240" text-anchor="middle" font-family="monospace" font-size="10" fill="#2dd4bf">RULE 3</text>
  <text x="360" y="256" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#8899aa">pattern: "DROP TABLE"  →  escalate</text>
  <line x1="490" y1="242" x2="540" y2="242" stroke="#8899aa" stroke-width="1" fill="none" marker-end="url(#b)"/>
  <text x="508" y="236" font-family="monospace" font-size="9" fill="#8899aa">match</text>
  <rect x="542" y="224" width="60" height="36" rx="4" fill="#1a1208" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="572" y="246" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b">ESCAL</text>
  <line x1="360" y1="264" x2="360" y2="288" stroke="#8899aa" stroke-width="1" fill="none" marker-end="url(#b)"/>
  <text x="368" y="280" font-family="monospace" font-size="9" fill="#8899aa">no match</text>
  <!-- Default -->
  <rect x="230" y="288" width="260" height="44" rx="6" fill="#1a0808" stroke="#f43f5e" stroke-width="0.5"/>
  <text x="360" y="307" text-anchor="middle" font-family="monospace" font-size="10" fill="#f43f5e">DEFAULT ACTION</text>
  <text x="360" y="323" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#8899aa">block  —  fail closed</text>
  <!-- Side note -->
  <text x="80" y="106" text-anchor="middle" font-family="monospace" font-size="10" fill="#8899aa">rules evaluated</text>
  <text x="80" y="120" text-anchor="middle" font-family="monospace" font-size="10" fill="#8899aa">in order —</text>
  <text x="80" y="134" text-anchor="middle" font-family="monospace" font-size="10" fill="#8899aa">first match wins</text>
  <line x1="130" y1="120" x2="228" y2="120" stroke="#1e2a38" stroke-width="0.5" stroke-dasharray="3 2"/>
</svg>
