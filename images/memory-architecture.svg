<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <style>
      .box { stroke: #1e2a38; stroke-width: 2; fill: #141b24; }
      .box-header { fill: #818cf8; }
      .text-white { fill: #e0e7ff; font-family: monospace; font-size: 13px; }
      .text-label { fill: #a5b4fc; font-family: system-ui; font-size: 12px; font-weight: 500; }
      .arrow { stroke: #818cf8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-label { fill: #a5b4fc; font-family: system-ui; font-size: 11px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#818cf8" />
    </marker>
  </defs>

  <rect class="box" x="50" y="20" width="500" height="60" rx="4" />
  <rect class="box-header" x="50" y="20" width="500" height="8" rx="4" />
  <text class="text-white" x="60" y="48">Your agent: remember() · recall() · context_for()</text>

  <path class="arrow" d="M 300,80 L 300,110" />

  <rect class="box" x="50" y="110" width="500" height="90" rx="4" />
  <rect class="box-header" x="50" y="110" width="500" height="8" rx="4" />
  <text class="text-white" x="60" y="135">plyra-memory</text>
  <text class="text-white" x="60" y="155">working layer · episodic layer · semantic layer</text>
  <text class="text-white" x="60" y="175">hybrid retrieval · token-budgeted</text>

  <path class="arrow" d="M 150,200 L 150,230" />
  <path class="arrow" d="M 300,200 L 300,230" />
  <path class="arrow" d="M 450,200 L 450,230" />

  <text class="arrow-label" x="130" y="225">local</text>
  <text class="arrow-label" x="275" y="225">local</text>
  <text class="arrow-label" x="435" y="225">server</text>

  <rect class="box" x="50" y="230" width="150" height="80" rx="4" />
  <text class="text-label" x="60" y="255">SQLite</text>
  <text class="text-white" x="60" y="280">working</text>
  <text class="text-white" x="60" y="295">episodic</text>

  <rect class="box" x="225" y="230" width="150" height="80" rx="4" />
  <text class="text-label" x="235" y="255">ChromaDB</text>
  <text class="text-white" x="235" y="280">episodic</text>
  <text class="text-white" x="235" y="295">semantic</text>

  <rect class="box" x="400" y="230" width="150" height="80" rx="4" />
  <text class="text-label" x="410" y="255">plyra-memory-server</text>
  <text class="text-white" x="410" y="280">Azure</text>
  <text class="text-white" x="410" y="295">(multi-tenant)</text>
</svg>