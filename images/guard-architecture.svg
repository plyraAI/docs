<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" style="background:#0d1117">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8899aa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- Agent box -->
  <rect x="180" y="32" width="360" height="72" rx="6" fill="#141b24" stroke="#1e2a38" stroke-width="0.5"/>
  <rect x="180" y="32" width="360" height="3" rx="2" fill="#5a7a96"/>
  <text x="360" y="66" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#f0f4f8">Your agent</text>
  <text x="360" y="86" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#8899aa">LangGraph · AutoGen · CrewAI · LangChain · plain Python</text>
  <!-- Arrow down -->
  <line x1="360" y1="104" x2="360" y2="136" stroke="#8899aa" stroke-width="1" fill="none" marker-end="url(#a)"/>
  <text x="372" y="124" font-family="monospace" font-size="10" fill="#8899aa">tool calls</text>
  <!-- Guard box -->
  <rect x="140" y="136" width="440" height="132" rx="6" fill="#0d1117" stroke="#1e2a38" stroke-width="0.5"/>
  <rect x="140" y="136" width="440" height="3" rx="2" fill="#2dd4bf"/>
  <text x="360" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#2dd4bf">plyra-guard</text>
  <line x1="140" y1="184" x2="580" y2="184" stroke="#1e2a38" stroke-width="0.5"/>
  <text x="240" y="206" text-anchor="middle" font-family="monospace" font-size="10" fill="#2dd4bf">INTERCEPT</text>
  <text x="360" y="206" text-anchor="middle" font-family="monospace" font-size="10" fill="#2dd4bf">EVALUATE</text>
  <text x="480" y="206" text-anchor="middle" font-family="monospace" font-size="10" fill="#2dd4bf">DECIDE</text>
  <line x1="300" y1="190" x2="300" y2="220" stroke="#1e2a38" stroke-width="0.5"/>
  <line x1="420" y1="190" x2="420" y2="220" stroke="#1e2a38" stroke-width="0.5"/>
  <text x="240" y="222" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8899aa">every tool call</text>
  <text x="360" y="222" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8899aa">against policy</text>
  <text x="480" y="222" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8899aa">allow · block · escalate</text>
  <line x1="140" y1="232" x2="580" y2="232" stroke="#1e2a38" stroke-width="0.5"/>
  <text x="360" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="#8899aa">in-process · sub-2ms · full audit log</text>
  <!-- Arrow allowed (teal) -->
  <line x1="360" y1="268" x2="360" y2="300" stroke="#2dd4bf" stroke-width="1" fill="none" marker-end="url(#a)"/>
  <text x="372" y="288" font-family="monospace" font-size="10" fill="#2dd4bf">allowed only</text>
  <!-- Tools box -->
  <rect x="180" y="300" width="360" height="72" rx="6" fill="#141b24" stroke="#1e2a38" stroke-width="0.5"/>
  <rect x="180" y="300" width="360" height="3" rx="2" fill="#5a7a96"/>
  <text x="360" y="334" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#f0f4f8">Tools</text>
  <text x="360" y="354" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#8899aa">files · databases · APIs · email · browsers</text>
  <!-- BLOCK -->
  <line x1="580" y1="202" x2="632" y2="202" stroke="#f43f5e" stroke-width="1" fill="none" stroke-dasharray="4 2" marker-end="url(#a)"/>
  <rect x="634" y="182" width="60" height="40" rx="4" fill="#1a0808" stroke="#f43f5e" stroke-width="0.5"/>
  <text x="664" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#f43f5e">BLOCK</text>
  <text x="664" y="214" text-anchor="middle" font-family="monospace" font-size="10" fill="#f43f5e">+ log</text>
  <!-- ESCALATE -->
  <line x1="140" y1="202" x2="88" y2="202" stroke="#f59e0b" stroke-width="1" fill="none" stroke-dasharray="4 2" marker-end="url(#a)"/>
  <rect x="26" y="182" width="60" height="40" rx="4" fill="#1a1208" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="56" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b">ESCAL</text>
  <text x="56" y="214" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b">→ human</text>
  <!-- Version pill -->
  <rect x="290" y="390" width="140" height="20" rx="10" fill="rgba(45,212,191,0.08)" stroke="#2dd4bf" stroke-width="0.5"/>
  <text x="360" y="404" text-anchor="middle" font-family="monospace" font-size="10" fill="#2dd4bf">v0.1.9 · PyPI · Apache 2.0</text>
</svg>
