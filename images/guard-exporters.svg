<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" style="background:#0d1117">
  <defs>
    <marker id="c" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8899aa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- Note -->
  <rect x="190" y="16" width="340" height="24" rx="4" fill="rgba(45,212,191,0.06)" stroke="rgba(45,212,191,0.2)" stroke-width="0.5"/>
  <text x="360" y="32" text-anchor="middle" font-family="monospace" font-size="10" fill="#2dd4bf">disable stdout in prod: ActionGuard(exporters=[])</text>
  <!-- ActionGuard center -->
  <rect x="250" y="56" width="220" height="56" rx="6" fill="#141b24" stroke="#2dd4bf" stroke-width="0.5"/>
  <rect x="250" y="56" width="220" height="3" rx="2" fill="#2dd4bf"/>
  <text x="360" y="83" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#f0f4f8">ActionGuard</text>
  <text x="360" y="101" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8899aa">decision event emitted</text>
  <!-- StdoutExporter (teal — default) -->
  <line x1="360" y1="112" x2="360" y2="156" stroke="#2dd4bf" stroke-width="1" fill="none" marker-end="url(#c)"/>
  <rect x="276" y="156" width="168" height="48" rx="6" fill="rgba(45,212,191,0.06)" stroke="#2dd4bf" stroke-width="0.5"/>
  <text x="360" y="177" text-anchor="middle" font-family="monospace" font-size="10" fill="#2dd4bf">StdoutExporter</text>
  <text x="360" y="193" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8899aa">on by default</text>
  <!-- OtelExporter -->
  <line x1="292" y1="84" x2="192" y2="84" stroke="#8899aa" stroke-width="1" fill="none" marker-end="url(#c)"/>
  <rect x="82" y="60" width="108" height="48" rx="6" fill="#141b24" stroke="#1e2a38" stroke-width="0.5"/>
  <text x="136" y="82" text-anchor="middle" font-family="monospace" font-size="10" fill="#8899aa">OTelExporter</text>
  <text x="136" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8899aa">→ Jaeger etc</text>
  <!-- DatadogExporter -->
  <line x1="278" y1="68" x2="214" y2="40" stroke="#8899aa" stroke-width="1" fill="none" marker-end="url(#c)"/>
  <!-- WebhookExporter -->
  <line x1="428" y1="84" x2="528" y2="84" stroke="#8899aa" stroke-width="1" fill="none" marker-end="url(#c)"/>
  <rect x="530" y="60" width="108" height="48" rx="6" fill="#141b24" stroke="#1e2a38" stroke-width="0.5"/>
  <text x="584" y="82" text-anchor="middle" font-family="monospace" font-size="10" fill="#8899aa">WebhookExporter</text>
  <text x="584" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8899aa">→ any URL</text>
  <!-- DatadogExporter box -->
  <rect x="530" y="136" width="108" height="48" rx="6" fill="#141b24" stroke="#1e2a38" stroke-width="0.5"/>
  <text x="584" y="158" text-anchor="middle" font-family="monospace" font-size="10" fill="#8899aa">DatadogExporter</text>
  <text x="584" y="174" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8899aa">→ Datadog</text>
  <line x1="442" y1="100" x2="530" y2="152" stroke="#8899aa" stroke-width="1" fill="none" marker-end="url(#c)"/>
</svg>
